<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TI HelpDesk — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f1a;
  --surface:#111827;
  --card:#161e2e;
  --elevated:#1e2a40;
  --border:rgba(255,255,255,0.08);
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#4b5a72;
  --blue:#3b82f6;
  --blue-dim:rgba(59,130,246,.15);
  --green:#22c55e;
  --red:#ef4444;
  --red-dim:rgba(239,68,68,.15);
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* ── Background grid pattern ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
body::after{
  content:'';
  position:fixed;
  top:-40%;left:-20%;
  width:60%;height:80%;
  background:radial-gradient(ellipse, rgba(59,130,246,.07) 0%, transparent 70%);
  pointer-events:none;
}

.login-wrapper{
  width:100%;
  max-width:420px;
  position:relative;
  z-index:1;
}

/* ── Logo / branding ── */
.brand{
  text-align:center;
  margin-bottom:32px;
}
.brand-icon{
  width:56px;height:56px;
  background:linear-gradient(135deg,var(--blue),#1d4ed8);
  border-radius:16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  margin-bottom:14px;
  box-shadow:0 8px 32px rgba(59,130,246,.35);
}
.brand-name{
  font-size:22px;
  font-weight:800;
  letter-spacing:-.5px;
}
.brand-sub{
  font-size:13px;
  color:var(--text2);
  margin-top:3px;
}

/* ── Card ── */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:32px;
  box-shadow:0 24px 64px rgba(0,0,0,.4);
}
.card-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:4px;
}
.card-sub{
  font-size:13px;
  color:var(--text2);
  margin-bottom:28px;
}

/* ── Form ── */
.form-group{
  margin-bottom:18px;
}
.form-group label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--text2);
  text-transform:uppercase;
  letter-spacing:.07em;
  margin-bottom:7px;
}
.input-wrap{
  position:relative;
}
.input-wrap .icon{
  position:absolute;
  left:12px;top:50%;
  transform:translateY(-50%);
  color:var(--text3);
  font-size:18px;
  pointer-events:none;
}
.form-input{
  width:100%;
  background:var(--elevated);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:11px 12px 11px 40px;
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.form-input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(59,130,246,.12);
}
.form-input::placeholder{color:var(--text3)}
.form-input.error{
  border-color:var(--red);
  box-shadow:0 0 0 3px rgba(239,68,68,.1);
}

/* ── Toggle password ── */
.toggle-pw{
  position:absolute;
  right:12px;top:50%;
  transform:translateY(-50%);
  color:var(--text3);
  font-size:18px;
  cursor:pointer;
  background:none;border:none;
  transition:color .15s;
}
.toggle-pw:hover{color:var(--text2)}

/* ── Error message ── */
.error-msg{
  display:none;
  background:var(--red-dim);
  border:1px solid rgba(239,68,68,.25);
  border-radius:8px;
  padding:10px 14px;
  font-size:13px;
  color:#fca5a5;
  margin-bottom:18px;
  align-items:center;
  gap:8px;
}
.error-msg.show{display:flex}

/* ── Submit button ── */
.btn-login{
  width:100%;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:13px;
  font-size:15px;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  transition:background .2s, transform .1s, box-shadow .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 4px 20px rgba(59,130,246,.3);
}
.btn-login:hover{background:#2563eb;box-shadow:0 6px 24px rgba(59,130,246,.4)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
  display:none;
}
.loading .spinner{display:block}
.loading .btn-text{display:none}

/* ── Divider ── */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;
  color:var(--text3);font-size:12px;
}
.divider::before,.divider::after{
  content:'';flex:1;
  height:1px;background:var(--border);
}

/* ── Quick access links ── */
.quick-links{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.quick-link{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  background:var(--elevated);
  border:1px solid var(--border);
  border-radius:9px;
  text-decoration:none;
  color:var(--text2);
  font-size:12px;
  font-weight:500;
  transition:all .15s;
}
.quick-link:hover{
  background:var(--blue-dim);
  border-color:rgba(59,130,246,.3);
  color:var(--blue);
}
.quick-link span{font-size:16px}

/* ── Footer ── */
.login-footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;
  color:var(--text3);
}

/* ── Success flash ── */
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.login-wrapper{animation:fadeInUp .4s ease}
</style>
</head>
<body>

<div class="login-wrapper">

  <div class="brand">
    <div class="brand-icon">🎫</div>
    <div class="brand-name">TI HelpDesk</div>
    <div class="brand-sub">Sistema de Chamados Corporativo</div>
  </div>

  <div class="card">
    <div class="card-title">Bem-vindo de volta</div>
    <div class="card-sub">Faça login para acessar o painel</div>

    <div class="error-msg" id="error-msg">
      <span>⚠</span>
      <span id="error-text">E-mail ou senha incorretos</span>
    </div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>E-mail</label>
        <div class="input-wrap">
          <span class="icon">✉</span>
          <input
            class="form-input"
            id="email"
            type="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input
            class="form-input"
            id="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button type="button" class="toggle-pw" onclick="togglePw()" id="toggle-pw-btn">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <div class="spinner"></div>
        <span class="btn-text">Entrar no sistema</span>
      </button>
    </form>

    <div class="divider">acesso rápido</div>

    <div class="quick-links">
      <a class="quick-link" href="/dashboard.html">
        <span>🖥</span> Painel TI
      </a>
      <a class="quick-link" href="/portal.html">
        <span>👤</span> Portal Usuário
      </a>
      <a class="quick-link" href="/docs" target="_blank">
        <span>📖</span> API / Swagger
      </a>
      <a class="quick-link" href="/health" target="_blank">
        <span>💚</span> Health Check
      </a>
    </div>
  </div>

  <div class="login-footer">
    TI HelpDesk v1.0 &nbsp;·&nbsp; Powered by FastAPI + Claude AI
  </div>

</div>

<script>
const API = '/api/v1';

// Detectar base URL automaticamente
function getAPI(){
  // Em desenvolvimento local, apontar para a porta 8000
  if(location.port === '5500' || location.port === '8080' || location.protocol === 'file:'){
    return 'http://localhost:8000/api/v1';
  }
  return '/api/v1';
}

async function doLogin(e){
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const errMsg   = document.getElementById('error-msg');

  // Reset estado
  errMsg.classList.remove('show');
  document.getElementById('email').classList.remove('error');
  document.getElementById('password').classList.remove('error');

  // Loading
  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch(`${getAPI()}/auth/login`, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.detail || 'Falha na autenticação');
    }

    // Salvar token e dados do analista
    localStorage.setItem('helpdesk_token',   data.access_token);
    localStorage.setItem('helpdesk_analyst', JSON.stringify(data.analyst));

    // Redirecionar para o painel
    window.location.href = '/dashboard.html';

  } catch(err) {
    document.getElementById('error-text').textContent = err.message;
    errMsg.classList.add('show');
    document.getElementById('email').classList.add('error');
    document.getElementById('password').classList.add('error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function togglePw(){
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

// Se já logado, ir direto para o painel
if(localStorage.getItem('helpdesk_token')){
  window.location.href = '/dashboard.html';
}

// Preencher e-mail padrão em dev
if(location.hostname === 'localhost' || location.hostname === '127.0.0.1'){
  document.getElementById('email').value    = 'admin@empresa.com';
  document.getElementById('password').value = 'Admin@123';
}
</script>
</body>
</html>
